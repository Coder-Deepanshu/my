<!DOCTYPE html>

<html lang="hi">
<head>
<meta charset="utf-8"/>
<meta content="width=1280, height=720" name="viewport"/>
<title>व्यक्तित्व की परिभाषा देते हुए व्यक्तित्व के प्रकारों की समीक्षा</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Noto Sans Devanagari', sans-serif;
            overflow: hidden;
        }
        .slide-container {
            width: 1280px;
            height: 720px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #1a1a2e;
            overflow: hidden;
        }
        .background-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.25;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(75, 0, 130, 0.5);
        }
        .content-wrapper {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 60px 80px;
            max-width: 1100px;
        }
        .title-box {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 50px 60px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border-top: 6px solid #7c3aed;
        }
        .main-title {
            font-size: 48px;
            font-weight: 800;
            color: #1a1a2e;
            line-height: 1.4;
            margin-bottom: 40px;
            letter-spacing: -0.5px;
        }
        .highlight {
            color: #7c3aed;
        }
        .info-section {
            display: flex;
            justify-content: space-around;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #e5e7eb;
        }
        .info-item {
            flex: 1;
            padding: 0 20px;
        }
        .info-label {
            font-size: 16px;
            font-weight: 600;
            color: #7c3aed;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .info-value {
            font-size: 20px;
            font-weight: 500;
            color: #374151;
        }
        .subtitle {
            font-size: 22px;
            font-weight: 400;
            color: #6b7280;
            margin-top: 20px;
            line-height: 1.6;
        }
        .icon-decoration {
            position: absolute;
            color: #7c3aed;
            opacity: 0.15;
            font-size: 120px;
        }
        .icon-1 {
            top: 50px;
            left: 80px;
        }
        .icon-2 {
            bottom: 50px;
            right: 80px;
        }
    </style>
</head>
<body>
<div class="slide-container">
<img alt="Psychology Background" class="background-image" src="https://page.gensparksite.com/slides_images/57f69e911350e5a479bdb74f99be2471.webp"/>
<div class="overlay"></div>
<i class="fas fa-brain icon-decoration icon-1"></i>
<i class="fas fa-users icon-decoration icon-2"></i>
<div class="content-wrapper">
<div class="title-box">
<h1 class="main-title">
<p><span class="highlight">व्यक्तित्व की परिभाषा</span> देते हुए</p>
<p>व्यक्तित्व के प्रकारों की समीक्षा</p>
</h1>
<div class="subtitle">
<p>मनोविज्ञान का एक महत्वपूर्ण अध्ययन</p>
</div>
<div class="info-section">
<div class="info-item">
<div class="info-label">
<p><i class="fas fa-user"></i> प्रस्तुतकर्ता</p>
</div>
<div class="info-value">
<p>अनु पमा</p>
</div>
</div>
<div class="info-item">
<div class="info-label">
<p><i class="fas fa-graduation-cap"></i> कक्षा</p>
</div>
<div class="info-value">
<p>बी.ए</p>
</div>
</div>
<div class="info-item">
<div class="info-label">
<p><i class="fas fa-book"></i> विषय</p>
</div>
<div class="info-value">
<p>व्यक्तित्व की परिभाषा एवं व्यक्तित्व के प्रकारों की विस्तृत समीक्षा</p>
</div>
</div>
</div>
</div>
</div>
</div>
</body>
</html>
