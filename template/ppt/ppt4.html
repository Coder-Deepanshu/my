<!DOCTYPE html>

<html lang="hi">
<head>
<meta charset="utf-8"/>
<meta content="width=1280, height=720" name="viewport"/>
<title>व्यक्तित्व के प्रकार: परिचय</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Noto Sans Devanagari', sans-serif;
            overflow: hidden;
        }
        .slide-container {
            width: 1280px;
            height: 720px;
            display: flex;
            background-color: #ffffff;
            overflow: hidden;
        }
        .left-content {
            flex: 1;
            padding: 50px 60px;
            display: flex;
            flex-direction: column;
            background-color: #f9fafb;
        }
        .right-image {
            width: 480px;
            position: relative;
            overflow: hidden;
        }
        .right-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .right-image::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(124, 58, 237, 0.15);
            z-index: 1;
        }
        .slide-title {
            font-size: 40px;
            font-weight: 800;
            color: #7c3aed;
            margin-bottom: 25px;
            line-height: 1.3;
        }
        .intro-text {
            font-size: 18px;
            font-weight: 500;
            color: #4b5563;
            margin-bottom: 35px;
            line-height: 1.6;
        }
        .features-list {
            display: flex;
            flex-direction: column;
            gap: 22px;
            margin-bottom: 30px;
        }
        .feature-item {
            display: flex;
            align-items: flex-start;
            background-color: #ffffff;
            padding: 22px 26px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            transition: all 0.3s ease;
        }
        .feature-item:hover {
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.15);
            transform: translateX(5px);
        }
        .icon-wrapper {
            width: 52px;
            height: 52px;
            min-width: 52px;
            background-color: #ede9fe;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 20px;
        }
        .icon-wrapper i {
            font-size: 24px;
            color: #7c3aed;
        }
        .feature-text {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .feature-text p {
            font-size: 18px;
            font-weight: 600;
            color: #1f2937;
            line-height: 1.5;
        }
        .note-box {
            background-color: #fef3c7;
            border-left: 4px solid #f59e0b;
            padding: 16px 20px;
            border-radius: 8px;
            margin-top: auto;
        }
        .note-box p {
            font-size: 15px;
            font-weight: 500;
            color: #92400e;
            line-height: 1.5;
        }
        .note-icon {
            color: #f59e0b;
            margin-right: 8px;
        }
    </style>
</head>
<body>
<div class="slide-container">
<div class="left-content">
<h1 class="slide-title">
<p>व्यक्तित्व के प्रकार: परिचय</p>
</h1>
<div class="intro-text">
<p>मनोवैज्ञानिक आधार पर प्रमुख वर्गीकरण:</p>
</div>
<div class="features-list">
<div class="feature-item">
<div class="icon-wrapper">
<i class="fas fa-male"></i>
</div>
<div class="feature-text">
<p>शारीरिक आधार पर</p>
</div>
</div>
<div class="feature-item">
<div class="icon-wrapper">
<i class="fas fa-brain"></i>
</div>
<div class="feature-text">
<p>मानसिक आधार पर</p>
</div>
</div>
<div class="feature-item">
<div class="icon-wrapper">
<i class="fas fa-heart"></i>
</div>
<div class="feature-text">
<p>स्वभाव (Temperament) के आधार पर</p>
</div>
</div>
<div class="feature-item">
<div class="icon-wrapper">
<i class="fas fa-user-friends"></i>
</div>
<div class="feature-text">
<p>व्यवहार (Type A/B) के आधार पर</p>
</div>
</div>
</div>
<div class="note-box">
<p><i class="fas fa-lightbulb note-icon"></i>टिप: एक व्यक्ति में एक से अधिक प्रकारों के गुण मिल सकते हैं।</p>
</div>
</div>
<div class="right-image">
<img alt="Personality Types Overview" src="https://page.gensparksite.com/slides_images/57f69e911350e5a479bdb74f99be2471.webp"/>
</div>
</div>
</body>
</html>
