<!DOCTYPE html>
<html>

<head>
    <title>QR Attendance</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }

        .qr-container {
            margin: 20px auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            display: inline-block;
            background: white;
        }

        #timer {
            font-size: 18px;
            font-weight: bold;
            margin: 20px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 5px;
            display: inline-block;
        }

        .expired {
            color: red;
            background: #ffe6e6 !important;
        }
    </style>

</head>

<body>
    <h2>Scan QR Code for Attendance</h2>

    <div class="qr-container">
        <!-- Using base64 image (Option 2) -->
        <img src="{{ qr_image }}" alt="QR Code" width="300" height="300">

    </div>

    <p>QR valid for:
    <p id="timer" data-id="{{ time_seconds }}"> 00:00:00</p>
    </p>

    <div style="margin-top: 20px; font-size: 14px; color: #666;">
        <p>Token: {{ qr_data|slice:":50" }}...</p>
        <p>Generated: {{ generated_time }}</p>
    </div>
    <script>
        let totalSeconds = document.getElementById('timer').getAttribute('data-id');
        let timerInterval; // Global scope mein declare karen

        function startTimer() {
            let hours = Math.floor(totalSeconds / 3600);
            let minutes = Math.floor((totalSeconds % 3600) / 60);
            let seconds = totalSeconds % 60;

            document.getElementById("timer").innerHTML =
                String(hours).padStart(2, '0') + ":" +
                String(minutes).padStart(2, '0') + ":" +
                String(seconds).padStart(2, '0');

            if (totalSeconds > 0) {
                totalSeconds--;
            } else {
                clearInterval(timerInterval);
                document.getElementById('timer').classList.add('expired');

                // Optional: Success message container
                let successMsg = document.createElement('div');
                successMsg.id = 'success-message';
                successMsg.style.cssText = 'background: #d4edda; color: #155724; padding: 15px; border-radius: 5px; margin: 20px auto; max-width: 500px;';
                successMsg.innerHTML = '<strong>Success!</strong> QR code has expired and attendance session is completed.';
                document.body.appendChild(successMsg);

                fetch('/111d0d11060a68466355171d1f3646691d53171e0c1315321e456602661719190b791d46111316121c1c5965/', {
                    method: 'POST',
                    headers: {
                        "Content-Type": "application/json",
                        "X-CSRFToken": getCookie("csrftoken")
                    },
                    body: JSON.stringify({
                        'completed': true
                    })
                })
                    .then(res => {
                        if (!res.ok) {
                            throw new Error('Network response was not ok');
                        }
                        return res.json();
                    })
                    .then(data => {
                        if (data.success) {
                            console.log("Success:", data.success);
                            // Update success message with server response
                            if (document.getElementById('success-message')) {
                                document.getElementById('success-message').innerHTML =
                                    `<strong>Success!</strong> ${data.success}`;
                            }
                        } else if (data.error) {
                            console.log("Error:", data.error);
                            // Error message container
                            let errorMsg = document.createElement('div');
                            errorMsg.id = 'error-message';
                            errorMsg.style.cssText = 'background: #f8d7da; color: #721c24; padding: 15px; border-radius: 5px; margin: 20px auto; max-width: 500px;';
                            errorMsg.innerHTML = `<strong>Error!</strong> ${data.error}`;
                            document.body.appendChild(errorMsg);
                        }
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        // Error message container
                        let errorMsg = document.createElement('div');
                        errorMsg.id = 'error-message';
                        errorMsg.style.cssText = 'background: #f8d7da; color: #721c24; padding: 15px; border-radius: 5px; margin: 20px auto; max-width: 500px;';
                        errorMsg.innerHTML = `<strong>Network Error!</strong> Please check your connection.`;
                        document.body.appendChild(errorMsg);
                    });
            }
        }

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.startsWith(name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        startTimer(); // first call
        timerInterval = setInterval(startTimer, 1000); // Ab initialize karen
    </script>
</body>

</html>
