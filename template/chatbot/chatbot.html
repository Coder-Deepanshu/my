<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional AI Chatbot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #131314;
            --sidebar-bg: #1e1f20;
            --text-color: #e3e3e3;
            --accent-color: #4b90ff;
            --hover-color: #333537;
            --input-bg: #1e1f20;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            padding: 15px;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .new-chat-btn {
            background: #282a2c;
            padding: 12px 15px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-weight: 500;
            margin-bottom: 20px;
            transition: 0.2s;
        }

        .new-chat-btn:hover { background: var(--hover-color); }

        .history-section {
            flex-grow: 1;
            overflow-y: auto;
        }

        .history-item {
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 5px;
        }

        .history-item:hover { background: var(--hover-color); }

        /* --- MAIN CHAT AREA --- */
        .main-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header {
            padding: 15px 20px;
            font-size: 20px;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-display {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px 15% 100px 15%; /* Spacing for center look */
        }

        .message {
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.ai i { color: #4b90ff; font-size: 24px; }
        .message.user i { color: #ffbb6d; font-size: 24px; }

        .message-content {
            line-height: 1.6;
            font-size: 16px;
        }

        /* --- INPUT AREA --- */
        .input-wrapper {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            max-width: 800px;
        }

        .input-container {
            background: var(--input-bg);
            border-radius: 30px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .input-container input {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 10px;
            font-size: 16px;
            outline: none;
        }

        .input-icons {
            display: flex;
            gap: 15px;
            color: #9aa0a6;
            cursor: pointer;
        }

        .input-icons i:hover { color: white; }

        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                left: -280px;
                height: 100%;
            }

            .sidebar.active {
                left: 0;
            }

            .chat-display {
                padding: 20px 5% 100px 5%;
            }

            .input-wrapper {
                width: 90%;
            }

            .menu-toggle {
                display: block !important;
                cursor: pointer;
            }
        }

        .menu-toggle { display: none; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="new-chat-btn">
            <i class="fas fa-plus"></i>
            <span>New Chat</span>
        </div>
        <div class="history-section">
            <p style="font-size: 12px; color: #9aa0a6; margin-bottom: 15px;">Recent</p>
            <div class="history-item"><i class="far fa-comment-alt"></i> &nbsp; How to learn Coding?</div>
            <div class="history-item"><i class="far fa-comment-alt"></i> &nbsp; HTML/CSS Professional UI</div>
            <div class="history-item"><i class="far fa-comment-alt"></i> &nbsp; JavaScript Logic Help</div>
        </div>
    </div>

    <div class="main-container">
        <div class="header">
            <div class="menu-toggle" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </div>
            <span>Gemini AI <i class="fas fa-caret-down" style="font-size: 14px;"></i></span>
            <div class="user-profile">
                <i class="fas fa-user-circle" style="font-size: 30px;"></i>
            </div>
        </div>

        <div class="chat-display" id="chat-display">
            <div class="message ai">
                <i class="fas fa-robot"></i>
                <div class="message-content">
                    Hello! Main aapki kaise madad kar sakta hoon? Aaj hum kuch naya seekhte hain.
                </div>
            </div>
        </div>

        <div class="input-wrapper">
            <div class="input-container">
                <input type="text" placeholder="Enter a prompt here..." id="user-input">
                <div class="input-icons">
                    <i class="fas fa-image"></i>
                    <i class="fas fa-microphone"></i>
                    <i class="fas fa-paper-plane" onclick="sendMessage()" style="color: var(--accent-color);"></i>
                </div>
            </div>
            <p style="text-align: center; font-size: 12px; color: #9aa0a6; margin-top: 10px;">
                Gemini may display inaccurate info, including about people.
            </p>
        </div>
    </div>

    <script>
        // Sidebar toggle for mobile
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        // Send Message Logic
        function sendMessage() {
            const input = document.getElementById('user-input');
            const chatDisplay = document.getElementById('chat-display');

            if (input.value.trim() !== "") {
                // User Message
                const userDiv = document.createElement('div');
                userDiv.className = 'message user';
                userDiv.innerHTML = `
                    <i class="fas fa-user-circle"></i>
                    <div class="message-content">${input.value}</div>
                `;
                chatDisplay.appendChild(userDiv);

                // Auto Scroll
                chatDisplay.scrollTop = chatDisplay.scrollHeight;

                // Clear input
                input.value = "";

                // Fake AI response (For Demo)
                setTimeout(() => {
                    const aiDiv = document.createElement('div');
                    aiDiv.className = 'message ai';
                    aiDiv.innerHTML = `
                        <i class="fas fa-robot"></i>
                        <div class="message-content">Bhai, ye ek professional UI demo hai. Aap isme backend connect karke real chats kar sakte ho!</div>
                    `;
                    chatDisplay.appendChild(aiDiv);
                    chatDisplay.scrollTop = chatDisplay.scrollHeight;
                }, 1000);
            }
        }

        // Enter key support
        document.getElementById('user-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
